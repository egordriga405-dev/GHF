<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#007aff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Exam Constructor</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Settings Bar -->
    <div class="settings-bar">
        <select class="theme-selector" id="themeSelector">
            <option value="telegram">🎨 Telegram тема</option>
            <option value="light">☀️ Светлая</option>
            <option value="dark">🌙 Тёмная</option>
        </select>
    </div>

    <!-- Header -->
    <header class="app-header">
        <h1 class="app-title">📚 Конструктор экзаменов</h1>
        <div class="mode-switch" id="modeSwitch">
            <button class="mode-btn active" data-mode="edit">✏️ Редактор</button>
            <button class="mode-btn" data-mode="train">🎓 Тренажёр</button>
        </div>
    </header>

    <!-- Topics Navigation -->
    <nav class="topics-scroll" id="topicsContainer"></nav>

    <!-- Questions List -->
    <main class="questions-list" id="questionsContainer">
        <div class="empty-state">
            <div class="empty-state-icon">📝</div>
            <div>Выберите тему или создайте новую</div>
        </div>
    </main>

    <!-- Toolbar -->
    <div class="toolbar" id="toolbar">
        <button class="btn btn-secondary" id="hideAllBtn">🙈 Скрыть ответы</button>
        <button class="btn btn-secondary" id="randomBtn">🎲 Случайный вопрос</button>
        <button class="btn btn-primary" id="exportBtn">📤 Экспорт HTML</button>
    </div>

    <!-- Form Container -->
    <div class="form-container" id="formContainer">
        <div class="form-title">Добавить материал</div>
        <div class="input-group">
            <label class="input-label">Название темы</label>
            <input type="text" id="topicInput" placeholder="Например: История России">
        </div>
        <div class="input-group">
            <label class="input-label">Вопрос</label>
            <input type="text" id="questionInput" placeholder="Введите вопрос">
        </div>
        <div class="input-group">
            <label class="input-label">Ответ</label>
            <textarea id="answerInput" placeholder="Введите правильный ответ"></textarea>
        </div>
        <div class="form-actions">
            <button class="btn btn-primary" id="addQuestionBtn">➕ Добавить вопрос</button>
            <button class="btn btn-secondary" id="createTopicBtn">📁 Создать тему</button>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" style="display: none;"></div>

    <!-- Export Modal -->
    <div id="exportModal" class="export-modal" style="display: none;"></div>

    <!-- Scripts -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="js/telegram.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/export.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
